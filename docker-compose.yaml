# docker-compose.yml
services:
  auth-service:
    build: ./backend/auth-service
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@auth-db:5432/${DB_NAME}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    develop:
      watch:
        - action: sync
          path: ./backend/auth-service
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./backend/auth-service/package.json
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - internal  
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - auth-data:/var/lib/postgresql/data
      - ./backend/auth-service/config/db-init:/docker-entrypoint-initdb.d
    networks:
      - internal  
  # frontend:
  #     build: ./frontend
  #     ports:
  #       - "3000:3000"  # или 5173 для Vite, или 3000 для CRA
  #     environment:
  #       - REACT_APP_API_URL=http://localhost:3001  # URL бэкенда
  #       - CHOKIDAR_USEPOLLING=true  # для hot-reload в Docker
  #       - WATCHPACK_POLLING=true    # для webpack 5+
  #     develop:
  #       watch:
  #         - action: sync
  #           path: ./frontend
  #           target: /app
  #           ignore:
  #             - node_modules/
  #         - action: rebuild
  #           path: ./frontend/package.json
  #     depends_on:
  #       - auth-service
  kong:
    image: kong:latest
    container_name: kong
    volumes:
      - ./kong/kong.yml:/usr/local/kong/declarative/kong.yml:ro
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000" # ← Единая точка входа для всех API
      - "8443:8443" # HTTPS (если понадобится)
      - "127.0.0.1:8001:8001" # Admin API (только localhost)
    depends_on:
      - auth-service
    healthcheck:
      test: [ "CMD", "kong", "health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - public

networks:
  internal:
    driver: bridge
    internal: true # Нет доступа из интернета (только внутренние сервисы)
  public:
    driver: bridge # Kong имеет доступ наружу
volumes:
  auth-data:
