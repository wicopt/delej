_format_version: "3.0"

# ========== СЕРВИСЫ ==========
services:
  - name: auth-service
    url: http://auth-service:3000
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
          credentials: true
      - name: rate-limiting
        config:
          minute: 30
          policy: local
    routes:
      - name: auth-login
        paths:
          - /api/auth/login
        methods:
          - POST
          - OPTIONS
        strip_path: false
      - name: auth-register
        paths:
          - /api/auth/register
        methods:
          - POST
          - OPTIONS
        strip_path: false
      - name: auth-refresh
        paths:
          - /api/auth/refresh
        methods:
          - POST
          - OPTIONS
        strip_path: false
      - name: auth-logout
        paths:
          - /api/auth/logout
        methods:
          - POST
          - OPTIONS
        strip_path: false
      - name: auth-health
        paths:
          - /api/v1/health
        methods:
          - GET
          - OPTIONS
        strip_path: false